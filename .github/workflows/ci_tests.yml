name: docker build

on:
  push:
    branches:
      - "ci_tests"
    paths-ignore:
      - 'README.md'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - 'docker-compose.yml'
      - 'modmqttd.service'
      - 'modmqttd/config.template.yaml'
      - 'buildtests/*'
      - '.vscode/*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64,  runner: ubuntu-24.04 }
          - { platform: linux/i386,   runner: ubuntu-24.04 }
          - { platform: linux/arm64,  runner: ubuntu-24.04-arm }
          - { platform: linux/arm/v7, runner: ubuntu-24.04-arm, emulated: true }
          - { platform: linux/arm/v6, runner: ubuntu-24.04-arm, emulated: true }
    steps:
      -
        name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >>"${GITHUB_ENV}"
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Set up QEMU
        if: ${{ matrix.emulated }}
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v10.2.3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,push=false
          build-args: |
            MQM_TEST_TIMING_FACTOR=10
